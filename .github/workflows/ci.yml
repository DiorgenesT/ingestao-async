name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ingestao_async_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Instalar dependencias
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint e formatacao (ruff)
        working-directory: backend
        run: |
          ruff check app tests
          ruff format --check app tests

      - name: Verificacao de tipos (mypy)
        working-directory: backend
        run: mypy app --strict

      - name: Testes de integracao
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ingestao_async_test
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ingestao_async_test
          SECRET_KEY: chave-de-ci-com-pelo-menos-32-caracteres-ok
          ENVIRONMENT: test
        run: pytest tests/ -q
